<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Project2 Blog</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-brand">
        <h1>Project2</h1>
        <p>Secure access to your dashboard.</p>
      </div>

      <div class="auth-actions">
        <a href="register.html"><button class="full">Register</button></a>
        <button id="emailBtn" class="full secondary">Login with Username</button>
        <button id="googleBtn" class="full secondary">Continue with Google</button>
      </div>

      <form id="loginForm" class="auth-form hidden">
        <input id="username" placeholder="Username" required>
        <input id="password" type="password" placeholder="Password" required>
        <button type="submit" class="full">Login</button>
      </form>

      <p class="auth-footer">Use Register, username login, or Google sign-in.</p>
      <div id="message" class="status hidden"></div>
    </div>
  </div>

  <script>
    const emailBtn = document.getElementById('emailBtn');
    const googleBtn = document.getElementById('googleBtn');
    const loginForm = document.getElementById('loginForm');
    const message = document.getElementById('message');

    emailBtn.addEventListener('click', () => {
      loginForm.classList.remove('hidden');
      message.classList.add('hidden');
    });

    googleBtn.addEventListener('click', () => {
      message.textContent = 'Google sign-in is not configured in this demo.';
      message.classList.remove('hidden');
      message.style.background = 'rgba(255, 206, 107, 0.2)';
      message.style.color = '#714b05';
    });

    loginForm.addEventListener('submit', async e => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      if (res.ok) {
        const data = await res.json();
        localStorage.setItem('token', data.token);
        window.location.href = 'dashboard.html';
      } else {
        const error = await res.text();
        message.textContent = error || 'Login failed.';
        message.classList.remove('hidden');
        message.style.background = 'rgba(217, 55, 74, 0.1)';
        message.style.color = '#8b1420';
      }
    });
  </script>
</body>
</html>
