<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | Project2 Blog</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body>
  <div class="container">
    <header class="page-header">
      <div class="site-brand">Project2 Blog</div>
      <nav class="site-nav">
        <a href="index.html">Home</a>
      </nav>
    </header>

    <section class="form-panel">
      <div class="panel">
        <div class="section-heading">
          <div>
            <h2>Admin sign in</h2>
            <p style="color: var(--muted); margin-top: 8px;">Only administrators may access the moderation controls.</p>
          </div>
        </div>
        <form id="adminLoginForm">
          <input id="username" placeholder="Admin username" required>
          <input id="password" type="password" placeholder="Password" required>
          <button type="submit">Login as Admin</button>
        </form>
      </div>
    </section>
  </div>

  <script>
    const message = document.createElement('div');
    const form = document.getElementById('adminLoginForm');
    form.after(message);
    message.className = 'status';
    message.style.display = 'none';

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      if (res.ok) {
        const data = await res.json();
        // verify role is admin before redirecting
        try{
          const payload = JSON.parse(atob(data.token.split('.')[1]));
          if(payload.role === 'admin'){
            localStorage.setItem('token', data.token);
            window.location.href = 'admin-dashboard.html';
            return;
          } else {
            message.textContent = 'Not an admin account.';
            message.style.display = 'block';
            return;
          }
        }catch(e){
          message.textContent = 'Login succeeded but role check failed.';
          message.style.display = 'block';
          return;
        }
      } else {
        const error = await res.text();
        message.textContent = error || 'Login failed.';
        message.style.display = 'block';
      }
    });

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
  </script>
</body>
</html>
