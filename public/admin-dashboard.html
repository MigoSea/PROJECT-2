<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Project2 Blog</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body>
  <div class="container">
    <header class="page-header">
      <div class="site-brand">Project2 Admin</div>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <button class="secondary logout-button" id="logoutButton">Logout</button>
      </nav>
    </header>

    <section class="section-heading">
      <div>
        <h2>Admin Control Panel</h2>
        <p style="color: var(--muted); margin-top: 8px;">Review users, moderate posts, and keep the community safe.</p>
      </div>
    </section>

    <div class="grid-3">
      <div class="panel">
        <h3>Users</h3>
        <div id="users" class="card-list"></div>
      </div>
      <div class="panel" style="grid-column: span 2;">
        <h3>Posts</h3>
        <div id="posts" class="card-list"></div>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token');
    if (!token) {
      window.location.href = 'admin-login.html';
    }
    // double-check role client-side and redirect if not admin
    function parseJwt(token){
      if(!token) return null;
      try{
        const base64Url = token.split('.')[1];
        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        const jsonPayload = decodeURIComponent(Array.prototype.map.call(atob(base64), c => '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
        return JSON.parse(jsonPayload);
      }catch(e){return null}
    }
    const payload = parseJwt(token);
    if(!payload || payload.role !== 'admin'){
      // not an admin — redirect to home
      window.location.href = 'index.html';
    }

    async function loadUsers() {
      const res = await fetch('/admin/users', { headers: { 'authorization': token }});
      const users = await res.json();
      document.getElementById('users').innerHTML = users.map(u => {
        const promoteBtn = u.role !== 'admin' ? `<button onclick="promoteUser('${u._id}')">Promote</button>` : '';
        const demoteBtn = u.role === 'admin' ? `<button class="secondary" onclick="demoteUser('${u._id}')">Demote</button>` : '';
        return `<div class="user-card"><h4>${u.username}</h4><small>${u.role}</small><div class="admin-controls">${promoteBtn}${demoteBtn}</div></div>`;
      }).join('');
    }

    async function loadPosts() {
      const res = await fetch('/admin/posts', { headers: { 'authorization': token }});
      const posts = await res.json();
      document.getElementById('posts').innerHTML = posts.map(p => 
        `<div class="post-card"><h4>${p.title}</h4><p>${p.body}</p><small>by ${p.author?.username || 'Unknown'}</small>
        <div class="admin-controls"><button class="danger" onclick="deletePost('${p._id}')">Delete</button></div></div>`
      ).join('');
    }

    async function deletePost(id) {
      await fetch('/admin/posts/' + id, { method: 'DELETE', headers: { 'authorization': token }});
      loadPosts();
    }

    async function promoteUser(id) {
      await fetch('/admin/users/' + id + '/promote', { method: 'POST', headers: { 'authorization': token }});
      loadUsers();
    }

    async function demoteUser(id) {
      await fetch('/admin/users/' + id + '/demote', { method: 'POST', headers: { 'authorization': token }});
      loadUsers();
    }

    document.getElementById('logoutButton').addEventListener('click', () => {
      localStorage.removeItem('token');
      window.location.href = 'admin-login.html';
    });

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
    loadUsers();
    loadPosts();
  </script>
</body>
</html>
