<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Project2 Blog</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body>
  <div class="container">
    <header class="page-header">
      <div class="site-brand">Project2 Blog</div>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
      </nav>
    </header>

    <section class="form-panel">
      <div class="panel">
        <div class="section-heading">
          <div>
            <h2>Create an account</h2>
            <p style="color: var(--muted); margin: 8px 0 0;">Join the community and start publishing posts.</p>
          </div>
        </div>
        <form id="registerForm">
          <input id="username" placeholder="Username" required>
          <input id="password" type="password" placeholder="Password" required>
          <button type="submit">Register</button>
        </form>
        <p style="margin-top: 18px; color: var(--muted);">Already registered? <a href="login.html">Login here</a>.</p>
      </div>
    </section>
  </div>

  <script>
    const message = document.createElement('div');
    const form = document.getElementById('registerForm');
    form.after(message);
    message.className = 'status';
    message.style.display = 'none';

    form.addEventListener('submit', async e => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !password) {
        message.textContent = 'Please fill in both fields.';
        message.style.display = 'block';
        return;
      }
      const res = await fetch('/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      if (res.ok) {
        message.textContent = 'Registered successfully. Redirecting to login...';
        message.style.display = 'block';
        setTimeout(() => window.location.href = 'login.html', 1200);
      } else {
        const error = await res.text();
        message.textContent = error || 'Registration failed.';
        message.style.display = 'block';
      }
    });

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
  </script>
</body>
</html>
